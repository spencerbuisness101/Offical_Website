name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    steps:
    - name: Get latest code
      uses: actions/checkout@v4

    - name: FTP Path Diagnostic
      env:
        FTP_SERVER: ${{ secrets.FTP_SERVER }}
        FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
        FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
      run: |
        # Create a simple test file
        echo "FTP_DEPLOY_TEST_$(date +%s)" > /tmp/ftp_test.txt
        cat /tmp/ftp_test.txt

        # Write .netrc for passwordless curl FTP (avoids shell escaping issues)
        printf 'machine %s\nlogin %s\npassword %s\n' "$FTP_SERVER" "$FTP_USERNAME" "$FTP_PASSWORD" > ~/.netrc
        chmod 600 ~/.netrc

        echo "=== Attempt 1: Upload to FTP root (/) ==="
        curl --netrc -v --ftp-create-dirs -T /tmp/ftp_test.txt "ftp://$FTP_SERVER/ftp_test_root.txt" 2>&1 || echo "FAILED"

        echo ""
        echo "=== Attempt 2: Upload to /public_html/ ==="
        curl --netrc -v --ftp-create-dirs -T /tmp/ftp_test.txt "ftp://$FTP_SERVER/public_html/ftp_test_pubhtml.txt" 2>&1 || echo "FAILED"

        echo ""
        echo "=== Attempt 3: Upload to /public_html/public_html/ ==="
        curl --netrc -v --ftp-create-dirs -T /tmp/ftp_test.txt "ftp://$FTP_SERVER/public_html/public_html/ftp_test_nested.txt" 2>&1 || echo "FAILED"

        echo ""
        echo "=== Attempt 4: List FTP root directory ==="
        curl --netrc -v "ftp://$FTP_SERVER/" 2>&1 || echo "FAILED"

        echo ""
        echo "=== DONE: Check these URLs ==="
        echo "1. https://thespencerwebsite.com/ftp_test_root.txt"
        echo "2. https://thespencerwebsite.com/ftp_test_pubhtml.txt"
        echo "3. https://thespencerwebsite.com/ftp_test_nested.txt"
