name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    steps:
    - name: Get latest code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install git-ftp
      run: sudo apt-get install -y git-ftp

    - name: Deploy via git-ftp
      run: |
        git ftp push \
          --syncroot _public_html/ \
          --remote-root /public_html/ \
          --user "$FTP_USERNAME" \
          --passwd "$FTP_PASSWORD" \
          "ftp://$FTP_SERVER" \
          --verbose \
        || {
          echo "--- push failed, running init (full upload) ---"
          git ftp init \
            --syncroot _public_html/ \
            --remote-root /public_html/ \
            --user "$FTP_USERNAME" \
            --passwd "$FTP_PASSWORD" \
            "ftp://$FTP_SERVER" \
            --verbose
        }
      env:
        FTP_SERVER: ${{ secrets.FTP_SERVER }}
        FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
        FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
