; Spencer's Website v7.0 - PHP Configuration for Hostinger
; Security + OPcache optimization settings

; --- Security Hardening ---
display_errors = On
log_errors = On
expose_php = Off
session.cookie_httponly = 1
session.cookie_secure = 1
session.cookie_samesite = Strict
session.use_strict_mode = 1
session.use_only_cookies = 1

; --- Upload Limits ---
upload_max_filesize = 10M
post_max_size = 12M

; --- Error Logging ---
; Hostinger: log path is relative to document root or use absolute path
error_log = logs/php_errors.log

; --- OPcache ---
opcache.enable=1
opcache.memory_consumption=256
opcache.max_accelerated_files=10000
opcache.revalidate_freq=30
opcache.fast_shutdown=1
opcache.enable_file_override=1
opcache.validate_timestamps=1
opcache.save_comments=1
opcache.load_comments=1
opcache.enable_file_override=1
opcache.optimization_level=0x7FFB
